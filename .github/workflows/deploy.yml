# Coastal Corridor — CI/CD Workflow
#
# Deployment strategy:
#   staging branch  → Vercel staging environment (auto-deploy on push)
#   main branch     → Vercel production environment (auto-deploy on push, after staging acceptance)
#
# Required GitHub repository secrets:
#   VERCEL_TOKEN                  — Vercel personal access token
#   VERCEL_ORG_ID                 — Vercel organisation/team ID (team_QEfjvuMgcDwFu4DU1zQqpAj5)
#   VERCEL_PROJECT_ID             — Vercel staging project ID (prj_dFudWPPxt710VhRQtZEmbUoqfyQ9)
#   VERCEL_PROD_PROJECT_ID        — Vercel production project ID (prj_BtWrjynFVbo9YzsydpGe6O57UgUT)
#   VERCEL_STAGING_ENV_URL        — Expected staging URL for smoke test
#   STAGING_DATABASE_URL          — Staging Supabase connection string (for prisma migrate deploy)
#   PRODUCTION_DATABASE_URL       — Production Supabase connection string (for prisma migrate deploy)
#
# Environment variables for application runtime are configured directly in Vercel per environment.
# They are NOT stored in this workflow file.
#
# Migration strategy (Option A — automated):
#   prisma migrate deploy runs against the target database BEFORE the new application code is
#   deployed. This ensures schema changes are in place before traffic hits code that depends on them.
#
# Spec reference: Implementation Brief §10, STAGING_SETUP.md
name: Deploy
on:
  push:
    branches:
      - staging
      - main
jobs:
  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run unit and integration tests
        run: pnpm exec vitest run

  # ─── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      # Run migrations BEFORE deploying application code.
      # If this step fails, the deploy step is skipped — preventing code from
      # running against a schema it expects but that doesn't exist yet.
      - name: Run database migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm exec prisma migrate deploy

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (staging)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel staging
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Smoke test — /api/health endpoint
        run: |
          STAGING_URL="${{ steps.deploy.outputs.url }}"
          echo "Smoke testing $STAGING_URL/api/health"
          # Allow up to 60s for the deployment to become available
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed: /api/health returned HTTP 200"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Smoke test failed: /api/health did not return 200 after 60s"
          exit 1

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://coastalcorridor.africa
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROD_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      # Run migrations BEFORE deploying application code.
      - name: Run database migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm exec prisma migrate deploy

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Smoke test — /api/health endpoint
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://coastalcorridor.africa/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Production smoke test passed: /api/health returned HTTP 200"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Production smoke test failed: /api/health did not return 200 after 60s"
          exit 1
